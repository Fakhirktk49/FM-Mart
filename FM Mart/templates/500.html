{% extends "website/base.html" %}
{% block 'title' %}500{% endblock 'title' %}
{% block 'css' %}
  <style>
    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(25px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .fade-up {
      animation: fadeUp 0.9s ease forwards;
    }
  </style>

{% endblock 'css' %}


{% block 'hero' %}
<div class="min-h-screen flex items-center justify-center bg-gray-950 px-4">

    <div class="text-center max-w-md">

        <h1 class="text-7xl font-bold text-red-500">
            500
        </h1>

        <h2 class="text-2xl font-semibold text-white mt-4">
            Internal Server Error
        </h2>

        <p class="text-gray-400 mt-3">
            Something went wrong on our side. Please try again later.
        </p>

        <div class="mt-6 flex gap-4 justify-center">

            <a href="/website/home"
               class="px-5 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition">
                Go Home
            </a>

            <a href="javascript:location.reload()"
               class="px-5 py-3 bg-gray-700 hover:bg-gray-600 text-white rounded-xl transition">
                Retry
            </a>

        </div>

    </div>

</div>
{% endblock %}
