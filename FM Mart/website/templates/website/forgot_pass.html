{% extends 'website/base.html' %}
{% block 'css' %}{% endblock 'css' %}
{% block 'hero' %}
<style>
    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .glass {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.15);
    }
  </style>

  <section class="min-h-screen  text-gray-200">

  <div class="w-full min-h-screen flex items-center justify-center p-6">

    <div class="glass w-full max-w-md p-10 rounded-3xl shadow-2xl animate-[fadeSlide_0.8s_ease]">
      <h1 class="text-3xl font-bold text-center mb-4">Forgot Password?</h1>
      <p class="text-center text-sm mb-6 opacity-80">Enter your email to receive a code.</p>

      <form class="space-y-5">
        <input type="email" placeholder="Your Email" class="w-full p-3 rounded-xl bg-white/10 focus:bg-white/20 outline-none transition" />

        <button class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-xl font-semibold transition">
          Send OTP
        </button>
      </form>

      <p class="text-center mt-5 text-sm opacity-80">
        Back to <a href="login.html" class="text-blue-400 hover:underline">Login</a>
      </p>
    </div>

  </div>

</section>
{% endblock 'hero' %}
