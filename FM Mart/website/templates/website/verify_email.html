{% extends 'website/base.html' %}
{% block 'css' %}{% endblock 'css' %}
{% block 'hero' %}
 <style>
    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(25px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
  <section>
    <div class="w-full min-h-screen flex items-center justify-center px-4">

      <!-- Card -->
      <div class="glass w-full max-w-md p-10 rounded-3xl shadow-2xl animate-[fadeSlide_0.8s_ease]">

        <h1 class="text-3xl font-bold text-center mb-4">Verify Your Email</h1>

        <p class="text-center text-sm mb-6 opacity-80">
          Enter your email address to receive the verification link.
        </p>

        <form class="space-y-5">
          <input 
            type="email" 
            placeholder="Enter your email"
            class="w-full p-3 rounded-xl bg-white/10 focus:bg-white/20 outline-none transition"
            required
          />

          <button 
            class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-xl font-semibold transition">
            Send Verification Link
          </button>
        </form>

        <p class="text-center mt-6 text-sm opacity-80">
          Already verified?  
          <a href="login.html" class="text-blue-400 hover:underline">Login</a>
        </p>

      </div>
    </div>
  </section>
{% endblock 'hero' %}
